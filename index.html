<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --blue: #003366; --orange: #FF6B00; --bg: #f0f2f5; --ok: #2ecc71; --no: #e74c3c; --no-light: #fff5f5; }
    body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; }
    
    #loginSection { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, var(--blue), var(--orange)); position: fixed; width: 100%; z-index: 9999; top:0; left:0; }
    .login-box { width: 85%; max-width: 350px; padding: 40px 25px; background: white; border-radius: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
    input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
    .btn-login { background: var(--orange); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer; }

    .header { background: var(--blue); color: white; padding: 20px 15px 30px 15px; border-radius: 0 0 30px 30px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .header h3 { margin: 0 0 15px 0; font-size: 18px; letter-spacing: 1px; }
    .btn-logout { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 10px; border-radius: 8px; font-size: 10px; }

    .summary-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .sum-badge { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px); padding: 8px 5px; border-radius: 12px; font-size: 9px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
    .sum-badge b { display: block; font-size: 14px; color: #fff; }
    .sum-badge.has-alerts b { color: var(--orange); }
    .sum-badge span { font-size: 18px; display: block; margin-bottom: 2px; }

    .search-container { margin-bottom: 15px; }
    .search-input { width: 100%; padding: 12px 15px; border-radius: 15px; border: 1px solid #ddd; font-family: inherit; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); outline: none; transition: 0.3s; box-sizing: border-box; }
    .search-input:focus { border-color: var(--orange); }

    .date-label { background: var(--orange); color: white; display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 10px; }
    .glosario-container { background: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid var(--orange); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .glosario-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 10px; }

    .view { display: none; padding: 20px 15px; }
    .view.active { display: block; }
    .card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
    .collapsible { background: var(--blue); color: white; padding: 16px; width: 100%; border: none; text-align: left; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; cursor: pointer; }
    .alerta { background: var(--no-light) !important; color: var(--no) !important; border: 1px solid rgba(231, 76, 60, 0.2); animation: pulse-border 2s infinite; }
    @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }

    .skeleton { background: #eee; background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%); border-radius: 14px; height: 50px; margin-bottom: 10px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }

    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: grid; grid-template-columns: repeat(4, 1fr); box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; height: 80px; }
    .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #aaa; cursor: pointer; border-top: 4px solid transparent; }
    .nav-item.active { color: var(--orange); background: #fff9f5; border-top-color: var(--orange); }
    .nav-item span { font-size: 24px; }
    
    .badge { padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; color: white; }
    .bg-ok { background: var(--ok); }
    .bg-no { background: var(--no); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 9px; }
    th { text-align: left; background: #f8f9fa; padding: 8px; border-bottom: 2px solid var(--blue); }
    td { padding: 8px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-box">
      <div style="font-size: 40px; margin-bottom: 10px;">📦</div>
      <h2 style="margin:0; color:var(--blue);">CONTROL OPS</h2>
      <input type="text" id="user" placeholder="Usuario">
      <input type="password" id="pass" placeholder="Clave">
      <button class="btn-login" onclick="login()">INGRESAR</button>
    </div>
  </div>

  <div id="portalSection" style="display:none;">
    <div class="header">
      <button class="btn-logout" onclick="window.top.location.href=window.top.location.href">Cerrar</button>
      <h3>UNIDROGAS OPS</h3>
      <div class="summary-container" id="summaryBar">
        <div class="sum-badge"><span>📱</span><b>...</b> Conexión</div>
        <div class="sum-badge"><span>🏪</span><b>...</b> Ops</div>
        <div class="sum-badge"><span>🔗</span><b>...</b> Int.</div>
      </div>
    </div>

    <div id="view-ast" class="view">
      <div class="search-container">
        <input type="text" class="search-input" id="search-ast" placeholder="🔍 Buscar picker por nombre..." onkeyup="filterList('ast')">
      </div>
      <div id="ast-cont"><div class="skeleton"></div></div>
    </div>

    <div id="view-ops" class="view active">
      <div id="date-display" class="date-label">Cargando fecha...</div>
      <div class="search-container">
        <input type="text" class="search-input" id="search-ops" placeholder="🔍 Buscar tienda o picker..." onkeyup="filterList('ops')">
      </div>
      <div id="glosario-shared"></div>
      <div id="ops-cont"><div class="skeleton"></div></div>
    </div>
    
    <div id="view-int" class="view">
      <h4 style="color:var(--blue); margin-top:0;">🔗 Integración de Tiendas</h4>
      <div id="int-cont"><div class="skeleton"></div></div>
    </div>
    
    <div id="view-kpi" class="view">
      <div id="glosario-matriz"></div>
      <div id="kpi-cont"><div class="skeleton"></div></div>
    </div>

    <div class="nav-bottom">
      <div class="nav-item" onclick="switchView('ast', this)"><span>📱</span>Conexión</div>
      <div class="nav-item active" onclick="switchView('ops', this)"><span>🏪</span>Ops</div>
      <div class="nav-item" onclick="switchView('int', this)"><span>🔗</span>Integración</div>
      <div class="nav-item" onclick="switchView('kpi', this)"><span>📊</span>Matriz</div>
    </div>
  </div>

  <script>
    let CACHE_DATA = null;

    function login() {
      const u = document.getElementById('user').value;
      const p = document.getElementById('pass').value;
      google.script.run.withSuccessHandler(res => {
        if(res.success) {
          document.getElementById('loginSection').style.display = 'none';
          document.getElementById('portalSection').style.display = 'block';
          preload();
        }
      }).checkLogin(u, p);
    }

    function preload() {
      google.script.run.withSuccessHandler(data => {
        CACHE_DATA = data;
        document.getElementById('date-display').innerText = "Fecha de corte: " + data.fechaCorte;
        renderGlosarios();
        renderOps();
        renderInt();
        renderKPI();
        loadAst(); 
      }).getTodoElPortal();
    }

    function filterList(type) {
      const input = document.getElementById('search-' + type);
      const filter = input.value.toLowerCase();
      const container = document.getElementById(type + '-cont');
      const items = container.getElementsByClassName(type === 'ops' ? 'collapsible' : 'card');
      for (let i = 0; i < items.length; i++) {
        const txtValue = items[i].textContent || items[i].innerText;
        items[i].style.display = txtValue.toLowerCase().includes(filter) ? "" : "none";
      }
    }

    function renderGlosarios() {
      const gHtml = `<div class="glosario-container"><div class="glosario-grid"><div><b>FULL:</b> % Encontrado</div><div><b>ORD:</b> Completas</div><div><b>CAN%:</b> Canceladas</div><div><b>DEF%:</b> Defectos</div></div></div>`;
      document.getElementById('glosario-shared').innerHTML = gHtml;
      document.getElementById('glosario-matriz').innerHTML = gHtml;
    }

    function renderSummary() {
      const opsA = CACHE_DATA.operacion.filter(r => r.cancelRate > 10 || r.defectRate > 5).length;
      const opsTotal = CACHE_DATA.operacion.length;
      const intA = CACHE_DATA.integracion.filter(r => r.status === "REVISIÓN").length;
      const intTotal = CACHE_DATA.integracion.length;
      let astA = CACHE_DATA.astData ? CACHE_DATA.astData.filter(r => r.status === "REVISIÓN").length : 0;
      let astTotal = CACHE_DATA.astData ? CACHE_DATA.astData.length : 0;

      document.getElementById('summaryBar').innerHTML = `
        <div class="sum-badge ${astA>0?'has-alerts':''}" onclick="switchView('ast', document.querySelectorAll('.nav-item')[0])">
          <span>📱</span><b>${astA} de ${astTotal}</b> en Revisión
        </div>
        <div class="sum-badge ${opsA>0?'has-alerts':''}" onclick="switchView('ops', document.querySelectorAll('.nav-item')[1])">
          <span>🏪</span><b>${opsA} de ${opsTotal}</b> Alertas
        </div>
        <div class="sum-badge ${intA>0?'has-alerts':''}" onclick="switchView('int', document.querySelectorAll('.nav-item')[2])">
          <span>🔗</span><b>${intA} de ${intTotal}</b> en Revisión
        </div>`;
    }

    function switchView(view, el) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('view-' + view).classList.add('active');
      el.classList.add('active');
      if(view === 'ast' && (!CACHE_DATA || !CACHE_DATA.astLoaded)) loadAst();
    }

    function renderOps() {
      let h = "";
      CACHE_DATA.operacion.forEach((r, i) => {
        const alert = r.cancelRate > 10 || r.defectRate > 5;
        h += `<button class="collapsible ${alert?'alerta':''}" onclick="fetchDetail('${r.id}','${r.semana}','${r.fechaRaw}','d${i}')"><span>${alert?'🔴':'🟢'} ${r.nombre}</span><span>▾</span></button><div id="d${i}" style="display:none; background:white; padding:15px; border-radius:0 0 14px 14px; margin-top:-10px; margin-bottom:15px; border:1px solid #eee;">Cargando...</div>`;
      });
      document.getElementById('ops-cont').innerHTML = h;
    }

    function fetchDetail(id, sem, fechaRaw, divId) {
      const el = document.getElementById(divId);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
      if(el.innerHTML !== "Cargando...") return;
      google.script.run.withSuccessHandler(d => {
        el.innerHTML = `<div style="font-size:11px;"><b>Tienda:</b> ${d.tienda}<br><b>FULL:</b> ${d.full}% | <b>ORD:</b> ${d.ord}<br><b>CAN:</b> ${d.canRate}% | <b>DEF:</b> ${d.defRate}%<br><div style="margin-top:8px; padding:8px; border-radius:8px; border-left:3px solid var(--orange); background:#fffaf5;"><b>FEEDBACK IA (Semana ${sem}):</b><br>${d.comentarios}</div></div>`;
      }).getDetalleIndividual(id, sem, fechaRaw);
    }

    function loadAst() {
      google.script.run.withSuccessHandler(data => {
        CACHE_DATA.astLoaded = true;
        CACHE_DATA.astData = data;
        renderSummary(); 
        let h = "";
        data.forEach(r => {
          const cls = r.status === 'OPERATIVO' ? 'bg-ok' : 'bg-no';
          h += `<div class="card ${r.status==='REVISIÓN'?'alerta':''}"><div style="display:flex; justify-content:space-between; align-items:center;"><b>${r.status==='REVISIÓN'?'🔴':'🟢'} ${r.nombre}</b><span class="badge ${cls}">${r.status}</span></div><div style="font-size:10px; color:#888; margin-top:5px;">Visto: ${r.ultima}</div><div style="font-size:10px; color:var(--no); margin-top:5px;">Faltas: ${r.faltas.join(', ')}</div></div>`;
        });
        document.getElementById('ast-cont').innerHTML = h;
      }).getAsistencias();
    }

    function renderInt() {
      let h = "";
      CACHE_DATA.integracion.forEach(r => {
        const cls = r.status === 'OPERATIVO' ? 'bg-ok' : 'bg-no';
        h += `<div class="card ${r.status==='REVISIÓN'?'alerta':''}" style="display:flex; justify-content:space-between; align-items:center;"><div><b>ID: ${r.tiendaId}</b><br><small style="color:#888;">Últ: ${r.time}</small></div><span class="badge ${cls}">${r.status}</span></div>`;
      });
      document.getElementById('int-cont').innerHTML = h;
    }

    function renderKPI() {
      let h = "";
      for(let nombre in CACHE_DATA.matriz) {
        h += `<div class="card"><b style="color:var(--blue); font-size:12px;">${nombre}</b><table><tr><th>SEM</th><th>FULL</th><th>ORD</th><th>CAN%</th><th>DEF%</th></tr>`;
        CACHE_DATA.matriz[nombre].forEach(s => {
          h += `<tr><td>${s.sem}</td><td>${s.full}%</td><td>${s.ord}</td><td>${s.can}%</td><td>${s.def}%</td></tr>`;
        });
        h += `</table></div>`;
      }
      document.getElementById('kpi-cont').innerHTML = h;
    }
  </script>
</body>
</html>
